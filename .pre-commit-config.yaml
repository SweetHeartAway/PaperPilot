# PaperPilot pre-commit 配置
# 安装：pip install pre-commit && pre-commit install
# 手动运行所有钩子：pre-commit run --all-files

repos:
  # ─── Backend: Python ──────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        name: ruff-lint (auto-fix)
        args:
          - --fix
          - --exit-non-zero-on-fix
        files: ^backend/
        types_or: [python, pyi]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 25.1.0
    hooks:
      - id: black
        name: black-format
        files: ^backend/
        types_or: [python, pyi]

  # ─── Frontend: TypeScript / React / CSS ───────────────────
  - repo: local
    hooks:
      - id: frontend-lint
        name: frontend-lint (oxlint)
        entry: cmd /c "cd frontend && npm run lint"
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false

      - id: frontend-format
        name: frontend-format (prettier)
        entry: cmd /c "cd frontend && npm run format"
        language: system
        files: ^frontend/src/
        types_or: [ts, tsx]
        pass_filenames: false

  # ─── Backend: Test Guard ──────────────────────────────────
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest (block on failure)
        entry: cmd /c "set PYTHONPATH=. && cd /d E:\paper-manager-project\backend && python -m pytest tests/ -x --tb=short"
        language: system
        files: ^backend/
        types_or: [python, pyi]
        pass_filenames: false
